<ion-header>
  <ion-toolbar color="primary">
    <ion-title>PC Builder</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <!-- COMPONENT SELECTION -->
  <ion-card>
    <ion-card-header>
      <ion-card-title>Select Components</ion-card-title>
    </ion-card-header>

    <ion-card-content>

      <ion-item>
        <ion-label>CPU</ion-label>
        <ion-select [(ngModel)]="selectedCpu" (ionChange)="onSelectionChange()">
          <ion-select-option *ngFor="let cpu of cpus" [value]="cpu">
            {{ cpu.name }}
          </ion-select-option>
        </ion-select>
      </ion-item>

      <ion-item>
        <ion-label>Motherboard</ion-label>
        <ion-select [(ngModel)]="selectedMotherboard" (ionChange)="onSelectionChange()">
          <ion-select-option *ngFor="let m of motherboards" [value]="m">
            {{ m.name }}
          </ion-select-option>
        </ion-select>
      </ion-item>

      <ion-item>
        <ion-label>RAM</ion-label>
        <ion-select [(ngModel)]="selectedRam" (ionChange)="onSelectionChange()">
          <ion-select-option *ngFor="let r of ram" [value]="r">
            {{ r.name }}
          </ion-select-option>
        </ion-select>
      </ion-item>

    </ion-card-content>
  </ion-card>

  <!-- COMPATIBILITY -->
  <ion-card *ngIf="errors.length > 0">
    <ion-card-header color="danger">
      <ion-card-title>
        <ion-icon name="warning-outline"></ion-icon>
        Compatibility Issues
      </ion-card-title>
    </ion-card-header>

    <ion-card-content>
      <ul>
        <li *ngFor="let error of errors">{{ error }}</li>
      </ul>
    </ion-card-content>
  </ion-card>

  <!-- SCORE -->
  <ion-card *ngIf="selectedCpu && selectedMotherboard && selectedRam">
    <ion-card-header>
      <ion-card-title>
        <ion-icon name="stats-chart-outline"></ion-icon>
        Compatibility Score
      </ion-card-title>
    </ion-card-header>

    <ion-card-content>
      <h2>{{ score }}%</h2>
    </ion-card-content>
  </ion-card>

  <!-- SAVE BUTTON -->
  <ion-button expand="block" color="success"
    (click)="saveBuild()"
    [disabled]="!selectedCpu || !selectedMotherboard || !selectedRam">

    <ion-icon name="save-outline" slot="start"></ion-icon>
    Save Build
  </ion-button>

</ion-content>
